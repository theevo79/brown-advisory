services:
  - type: web
    name: brown-advisory-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_PATH
        sync: false
      - key: APP_DATABASE_PATH
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: "false"
    disk:
      name: brown-data
      mountPath: /data
      sizeGB: 2
